<!DOCTYPE html>
<html>
    <head>
        <title>Registrar's Office</title>
        <link rel="stylesheet" href= "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <script src = "https://cdn.jsdelivr.net/npm/mustache@4.2.0/mustache.min.js"></script>
        <script src= "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap
.bundle.min.js"> </script>
        <style>
         .header, .footer {background-color:#295078; color:white}
         .headerlink, .footerlink {color:white}
      </style>
    </head>

    <body>
        <div class="modal" id="detailsModal">
         <div class="modal-dialog">
            <div class="modal-content">
               <div class="modal-header">
                  <h4 class="modal-title">Registrar's Office</h4>
                  <button class="btn-close" data-bs-dismiss="modal">
                  </button>
               </div>
               <div class="modal-body" id="detailsModalBody">
                  Modal body; to be replaced.
               </div>
               <div class="modal-footer">
                  <button class="btn btn-danger"
                     data-bs-dismiss="modal">
                     Close
                  </button>
               </div>
            </div>
         </div>
      </div>

        <div class="container-fluid sticky-top header">
            <div class="row">
            <h1 style="text-align: center;">Registrar's Office: Class Search</h1>
            <!--the form for search criteria-->
            
            <div class="container-fluid">
            <form action ="/" method="get">
                    <div class="row" style="display: flex; justify-content: center; align-items: center;">
                        <div class="col-sm-3">
                        <input class="form-control" type="text" name="department" id="deptInput" placeholder="Deptartment" autofocus>
                        </div>
                        <div class="col-sm-3">
                        <input class="form-control" type="text" name = "course number" id="coursenumInput" placeholder="Number">
                        </div>
                        <div class="col-sm-3">
                        <input class="form-control" type="text" name = "area" id="areaInput" placeholder="Area">
                        </div>
                        <div class="col-sm-3">
                        <input class="form-control" type="text" name = "title" id="titleInput" placeholder="Title" >
                        </div>
                    </div>
                                    
            </form>
            </div>
            </div>
        </div>
            <div id="overviewsDiv"></div>

            <div class="container-fluid sticky-bottom footer">
         <center>
            Created by <a class="footerlink"
            href="http://www.cs.princeton.edu/~rdondero">
            Ariel Yuan & Grace Best</a>
         </center>
      </div>
           <script>
            'use = strict';
            function convertToHtml(courses) {
                let html = '';
                html += `
                <table class="table table-striped" id="overviewsTable" border = "2" cellpadding = "1" cellspacing = "2">
                <tr>
                    <th><strong>ClassId</strong></th>
                    <th><strong>Dept</strong></th>
                    <th><strong>Num</strong></th>
                    <th><strong>Area</strong></th>
                    <th><strong>Title</strong></th>
                </tr>
                `;
                let template = `
                {{#courses}}
                    <tr>
                        <td><button id="classidModal" onclick="getModal({{classid}})"</button>{{classid}}</td> 
                        <td>{{dept}}</td> 
                        <td>{{coursenum}}</td>
                        <td>{{area}}</td> 
                        <td>{{title}}</td> 
                    </tr>
                {{/courses}}
                    `;

                let map = {courses: courses};
                html += Mustache.render(template, map)  
                html += '</table>'; 
                return html;

            }

            function convertToModalHtml(details) {
                let html = '';
                html += `
                `;
                let template = `
                
                {{#details}}
                    <h2> Class Details </h2>
                    <table id="classDetailsTable" border = "1" cellpadding = "1" cellspacing = "2">
                        <tr>
                            <td><strong>Class Id</strong></td>
                            <td>{{classid}}</td>
                        </tr>
                        <tr>
                            <td><strong>Days</strong></td>
                            <td>{{days}}</td>
                        </tr>
                        <tr>
                            <td><strong>Start time</strong></td>
                            <td>{{starttime}}</td>
                        </tr>
                        <tr>
                            <td><strong>End time</strong></td>
                            <td>{{endtime}}</td>
                        </tr>
                        <tr>
                            <td><strong>Building</strong></td>
                            <td>{{1][bldg}}</td>
                        </tr>
                        <tr>
                            <td><strong>Room</strong></td>
                            <td>{{roomnum}}</td>
                        </tr>
                    </table>
                    <h2> Course Details </h2>
                    <table id="courseDetailsTable" border = "1" cellpadding = "1" cellspacing = "2">
                        <tr>
                            <td><strong>Course Id</strong></td>
                            <td>{{courseid]}}</td>
                        </tr>      
                        <!-- Loop through department numbers -->
                        {{#deptcoursenums}}
                            <tr>
                                <td><strong>Dept and Number</strong></td>
                                <td>{{dept}} {{coursenum}}</td>
                            </tr>
                        {{/deptcoursenums}}
                        <tr>
                            <td><strong>Area</strong></td>
                            <td>{{area}}</td>
                        </tr>
                        <tr>
                            <td><strong>Title</strong></td>
                            <td>{{title}}</td>
                        </tr>
                        <tr>
                            <td><strong>Description</strong></td>
                            <td>{{descrip}}</td>
                        </tr>
                        <tr>
                            <td><strong>Prerequisites</strong></td>
                            <td>{{prereqs}}</td>
                        </tr>
                        <!-- Loop through all professors -->
                        {{#profnames}}
                            <tr>
                                <td><strong>Professor</strong></td>
                                <td>{{prof}} </td>
                            </tr>
                        {{/profnames}}
                        </table>
                {{/details}}
                    `;

                let map = {details: details};
                html += Mustache.render(template, map)  
                return html;

            }

            
            function handleResponse() {
                if (this.status !== 200) {
                    alert("Error: Failed to fetch data from server");
                    return;
                }
                let courses = JSON.parse(this.response);
                courses = courses[1]
                console.log('we have courses: ', courses);
                
                let html = convertToHtml(courses);
                let overviewsDiv = document.getElementById('overviewsDiv');
                overviewsDiv.innerHTML = html;
            }

            function handleModal() {
                console.log("handle modal");
                if (this.status !== 200) {
                    alert("Error: Failed to fetch data from server");
                    return;
                }
                console.log(this.response);

                let details = JSON.parse(this.response);
                details = details[1]
                console.log('we have details: ', details);
                
                let html = convertToModalHtml(details);

                let detailsModalBodyNode = document.getElementById('detailsModalBody');
                detailsModalBodyNode.innerHTML = html;
                let detailsModalNode = document.getElementById('detailsModal')
                let detailsModal = new bootstrap.Modal(detailsModalNode);
                detailsModal.show();
            }

            function handleError() {
                alert("Error: Failed to fetch data from server");
                }
            
            let requestOverviews = null;
            let requestDetails = null;
            function getResults() {
                let deptInput = document.getElementById('deptInput');
                let dept = deptInput.value;
                let encodedDept = encodeURIComponent(dept);

                let coursenumInput = document.getElementById('coursenumInput');
                let coursenum = coursenumInput.value;
                let encodedCourseNum = encodeURIComponent(coursenum);

                let areaInput = document.getElementById('areaInput');
                let area = areaInput.value;
                let encodedArea = encodeURIComponent(area);

                let titleInput = document.getElementById('titleInput');
                let title = titleInput.value;
                let encodedTitle = encodeURIComponent(title);

                let url = '/searchresults?dept=' + encodedDept + "&coursenum=" + encodedCourseNum + "&area=" + encodedArea + "&title=" + encodedTitle;
                if (requestOverviews !== null) {
                    requestOverviews.abort();
                }
                console.log("happened");
                requestOverviews = new XMLHttpRequest();
                requestOverviews.onload = handleResponse;
                console.log("loaded");
                requestOverviews.open("GET", url);
                requestOverviews.send();

            }

            
            function getModal(classid) {
                console.log("classid, ", classid);
                console.log("getModal")
                let encodedClassId = encodeURIComponent(classid);
                let url = '/regdetails?classid=' + encodedClassId;
                if (requestDetails !== null) {
                    console.log("aborted")
                    requestDetails.abort();
                }
                requestDetails = new XMLHttpRequest();
                requestDetails.onload = handleModal;
                console.log("loaded getModal");
                requestDetails.open("GET", url);
                requestDetails.send();
            }
            
            function setup() {
                getResults();
                let deptInput = document.getElementById('deptInput');
                deptInput.addEventListener('input', getResults);

                let coursenumInput = document.getElementById('coursenumInput');
                coursenumInput.addEventListener('input', getResults);

                let areaInput = document.getElementById('areaInput');
                areaInput.addEventListener('input', getResults);

                let titleInput = document.getElementById('titleInput');
                titleInput.addEventListener('input', getResults);

                let classidModal = document.getElementById('classidModal');
                classidModal.addEventListener('click', getModal);
            }

            document.addEventListener('DOMContentLoaded', setup);
            </script>
           
        <br>
        {% endif %}    
    
    </body>
</html>
